<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contentMenu{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid blue;
        }

        .menu{
            border: 2px solid blue;
            height: 30px;
            width: 40%; 
        }
        .rectangle{
            height: 300px;
            border: 2px solid blue;
            margin: 30px auto;
            background: linear-gradient(30deg, green , red);
        }
        .grandrect{
            
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
           gap: 30px ;
        }
        .petitrect{
            border: 2px solid red;
            width: 30%;
            height: 200px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="contentMenu">
        <div class="logo"></div>
        <div class="menu"></div>
    </div>

    <div class="rectangle"></div>
    <div class="grandrect">
        <div class="petitrect"></div>
        <div class="petitrect"></div>
        <div class="petitrect"></div>
        <div class="petitrect"></div>
        <div class="petitrect"></div>
        <div class="petitrect"></div>
    </div>
</body>
</html>
